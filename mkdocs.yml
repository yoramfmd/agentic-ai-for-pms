site_name: Agentic AI for Product Managers
site_description: A lifecycle framework for building, evaluating, and governing agentic AI systems
site_author: Yoram Friedman
site_url: https://yoramfmd.github.io/agentic-ai-for-pms/
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.tooltips
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/yoramfmd/agentic-ai-for-pms
repo_name: yoramfmd/agentic-ai-for-pms

nav:
  - Home: index.md
  - Preface: 00-preface.md
  - "Phase 0 — AI Literacy": 01-ai-literacy.md
  - "Phase 1 — Discover and Decide": 02-discover-and-decide.md
  - "Phase 2 — Design": 03-design.md
  - "Phase 3 — Evaluate": 04-evaluate.md
  - "Phase 4 — Observe": 05-observe.md
  - "Phase 5 — Operate and Retire": 06-operate-govern-retire.md
  - PM Tools and Templates: 07-tools-and-templates.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: 2
  - attr_list
  - md_in_html

plugins:
  - search:
      lang: en

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/yoramfriedman/
      name: LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/yoramfmd/agentic-ai-for-pms
      name: GitHub
  generator: false

extra_css:
  - stylesheets/extra.css
