<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Inter, system-ui, sans-serif">
  <title>The Four-Layer Agentic Stack</title>
  <desc>Four layers of an agentic AI system: Foundation Model, Orchestration, Tools, and Context. Teams control layers 2-3 but most design errors happen in layer 4.</desc>

  <rect width="720" height="380" fill="#f8f9fa" rx="8"/>

  <text x="360" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">The Four-Layer Agentic Stack</text>
  <text x="360" y="52" text-anchor="middle" font-size="11" fill="#6c757d">Most teams design layer 4 by accident</text>

  <rect x="40" y="290" width="640" height="64" rx="6" fill="#fff3bf" stroke="#f59f00" stroke-width="2"/>
  <text x="110" y="316" text-anchor="middle" font-size="13" font-weight="700" fill="#e67700">Layer 4</text>
  <text x="110" y="334" text-anchor="middle" font-size="11" fill="#e67700">Context</text>
  <text x="390" y="316" text-anchor="middle" font-size="11" fill="#495057">Prompt instructions · retrieved documents · customer records · workflow history</text>
  <text x="390" y="334" text-anchor="middle" font-size="11" font-weight="600" fill="#e67700">⚠ Most expensive design error lives here</text>

  <rect x="80" y="216" width="560" height="64" rx="6" fill="#ffe8cc" stroke="#fd7e14" stroke-width="2"/>
  <text x="150" y="242" text-anchor="middle" font-size="13" font-weight="700" fill="#d9480f">Layer 3</text>
  <text x="150" y="260" text-anchor="middle" font-size="11" fill="#d9480f">Tools</text>
  <text x="400" y="242" text-anchor="middle" font-size="11" fill="#495057">Every API · database · action the agent can take</text>
  <text x="400" y="260" text-anchor="middle" font-size="11" fill="#495057">Each tool is a permission · more tools = larger failure surface</text>

  <rect x="120" y="142" width="480" height="64" rx="6" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2"/>
  <text x="210" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#2b8a3e">Layer 2</text>
  <text x="210" y="186" text-anchor="middle" font-size="11" fill="#2b8a3e">Orchestration</text>
  <text x="420" y="168" text-anchor="middle" font-size="11" fill="#495057">Tool sequencing · retry logic · error handling · memory</text>
  <text x="420" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="#2b8a3e">← Your team controls this layer</text>

  <rect x="160" y="68" width="400" height="64" rx="6" fill="#dbe4ff" stroke="#3b5bdb" stroke-width="2"/>
  <text x="255" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#364fc7">Layer 1</text>
  <text x="255" y="112" text-anchor="middle" font-size="11" fill="#364fc7">Foundation Model</text>
  <text x="430" y="94" text-anchor="middle" font-size="11" fill="#495057">Anthropic · OpenAI · Google</text>
  <text x="430" y="112" text-anchor="middle" font-size="11" fill="#495057">You select it; provider updates it</text>

  <line x1="690" y1="142" x2="690" y2="206" stroke="#2f9e44" stroke-width="2"/>
  <line x1="685" y1="142" x2="690" y2="142" stroke="#2f9e44" stroke-width="2"/>
  <line x1="685" y1="206" x2="690" y2="206" stroke="#2f9e44" stroke-width="2"/>
  <text x="706" y="178" text-anchor="middle" font-size="9" fill="#2b8a3e" transform="rotate(90, 706, 178)">You control</text>
</svg>
